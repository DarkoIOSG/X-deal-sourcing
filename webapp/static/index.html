<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOSG Deal Radar</title>
<script>
  // Apply saved theme before first paint to avoid flash
  (function(){ var t=localStorage.getItem('theme'); if(t==='dark') document.documentElement.dataset.theme='dark'; })();
</script>
<style>
/* ── Theme variables ── */
html {
  --bg:              #f3f3f8;
  --surface:         #ffffff;
  --surface2:        #ededf5;
  --border:          #e0e0ec;
  --border2:         #d0d0e2;
  --text:            #1a1a2e;
  --text-logo:       #1a1a2e;
  --text2:           #7070a8;
  --text3:           #8888bb;
  --text4:           #a0a0c8;
  --accent:          #e05c38;
  --accent-bg:       #fde8e0;
  --accent-border:   #cc6040;
  --accent-text:     #8a2010;
  --green-bg:        #e6f7ee;
  --green-border:    #58b878;
  --green-text:      #1a6a38;
  --red-bg:          #fce8e8;
  --red-border:      #cc7070;
  --red-text:        #882020;
  --yellow-bg:       #fdf3dc;
  --yellow-border:   #c8a030;
  --yellow-text:     #7a5808;
  --stage-bg:        #eeebff;
  --stage-border:    #b8a8e8;
  --stage-text:      #5040a8;
  --memo-text:       #5858a0;
  --memo-strong:     #282860;
  --memo-h3:         #6050b8;
  --card-hover:      #c8c8de;
  --overlay-bg:      rgba(180,180,210,0.88);
  --spinner-track:   #d8d8ee;
  --tag-bg:          #ededf5;
  --tag-border:      #d8d8ec;
  --tag-text:        #6060a0;
  --badge-bg:        #e8e8f5;
  --badge-text:      #8888bb;
  --badge-active-bg: #fde0d0;
  --badge-active-text:#8a2010;
}
html[data-theme="dark"] {
  --bg:              #0d0d12;
  --surface:         #13131a;
  --surface2:        #1c1c28;
  --border:          #22222e;
  --border2:         #2e2e42;
  --text:            #dddde8;
  --text-logo:       #ffffff;
  --text2:           #55558a;
  --text3:           #7777a0;
  --text4:           #33336a;
  --accent:          #e8724a;
  --accent-bg:       #3a1a0c;
  --accent-border:   #a04030;
  --accent-text:     #f8a870;
  --green-bg:        #112618;
  --green-border:    #1f5c34;
  --green-text:      #4ebb77;
  --red-bg:          #2c1111;
  --red-border:      #5c1f1f;
  --red-text:        #eb6060;
  --yellow-bg:       #221c0c;
  --yellow-border:   #5c450f;
  --yellow-text:     #d4a336;
  --stage-bg:        #1a1630;
  --stage-border:    #352d60;
  --stage-text:      #9b8ee8;
  --memo-text:       #8888b0;
  --memo-strong:     #c8c8e0;
  --memo-h3:         #c0b8f8;
  --card-hover:      #36364e;
  --overlay-bg:      rgba(7,7,14,0.95);
  --spinner-track:   #22223a;
  --tag-bg:          #1c1c28;
  --tag-border:      #28283c;
  --tag-text:        #5a5a88;
  --badge-bg:        #22223a;
  --badge-text:      #7777aa;
  --badge-active-bg: #3a1a0c;
  --badge-active-text:#f8a870;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.2s, color 0.2s;
}

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: stretch; gap: 0;
  transition: background 0.2s, border-color 0.2s;
}

.logo {
  font-size: 16px; font-weight: 700; color: var(--text-logo); letter-spacing: -0.3px;
  white-space: nowrap; padding: 14px 20px 14px 0; margin-right: 8px;
  border-right: 1px solid var(--border);
  align-self: center;
}
.logo span { color: var(--accent); }

/* ── Tab nav ── */
.tabs { display: flex; align-items: stretch; gap: 0; }
.tab {
  display: flex; align-items: center; gap: 6px;
  padding: 0 20px;
  font-size: 15px; font-weight: 500; color: var(--text2);
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.12s, border-color 0.12s;
  white-space: nowrap; height: 52px;
  background: none; border-top: none; border-left: none; border-right: none;
}
.tab:hover { color: var(--text3); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab .badge {
  background: var(--badge-bg); border-radius: 10px; padding: 2px 8px;
  font-size: 13px; color: var(--badge-text);
}
.tab.active .badge { background: var(--badge-active-bg); color: var(--badge-active-text); }

/* ── Voter picker (header) ── */
.voter-wrap {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
  padding: 10px 0;
}
.voter-label { font-size: 13px; color: var(--text2); white-space: nowrap; }
.voter-name-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text);
  padding: 8px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: border-color 0.12s, background 0.2s;
}
.voter-name-btn:hover { border-color: var(--accent); }

/* ── Theme toggle ── */
.theme-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text2);
  padding: 8px 11px; font-size: 15px; cursor: pointer; line-height: 1;
  transition: border-color 0.12s, background 0.2s, color 0.12s;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Auth overlay ── */
.voter-overlay {
  position: fixed; inset: 0; z-index: 999;
  background: var(--overlay-bg);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
}
.voter-overlay.hidden { display: none; }
.voter-modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 18px; padding: 48px 52px;
  display: flex; flex-direction: column; align-items: center; gap: 24px;
  min-width: 360px; text-align: center;
}
.voter-modal .modal-logo { font-size: 18px; font-weight: 800; color: var(--text-logo); letter-spacing: -0.4px; }
.voter-modal .modal-logo span { color: var(--accent); }
.voter-modal h2 { font-size: 20px; font-weight: 700; color: var(--text-logo); }
.voter-modal p { font-size: 13px; color: var(--text2); line-height: 1.5; }
.voter-modal .error-msg { font-size: 12px; color: var(--red-text); background: var(--red-bg); border: 1px solid var(--red-border); border-radius: 8px; padding: 10px 14px; width: 100%; }

.google-btn {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  width: 100%; padding: 13px 20px;
  background: #fff; border: none; border-radius: 12px;
  color: #111; font-size: 15px; font-weight: 600; cursor: pointer;
  transition: background 0.12s, transform 0.1s;
}
.google-btn:hover { background: #f0f0f0; transform: translateY(-1px); }
.google-btn svg { flex-shrink: 0; }

/* ── Sub-filters ── */
.subfilters {
  display: flex; gap: 6px;
  padding: 14px 24px 0;
  max-width: 1280px; margin: 0 auto;
  flex-wrap: wrap;
}
.sub-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 7px; color: var(--text2);
  padding: 7px 14px; font-size: 13px; cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.sub-btn:hover { color: var(--text); border-color: var(--accent-border); }
.sub-btn.active { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent-text); }
.filter-divider { width: 1px; background: var(--border); margin: 0 6px; align-self: stretch; }

/* ── Main ── */
main { max-width: 1280px; margin: 0 auto; padding: 20px 24px 48px; }

.summary { font-size: 13px; color: var(--text4); margin-bottom: 20px; }

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 18px;
}

/* ── Card ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 22px;
  display: flex; flex-direction: column; gap: 13px;
  transition: border-color 0.15s, background 0.2s;
  position: relative;
}
.card:hover { border-color: var(--card-hover); }
.card.reviewed { opacity: 0.7; }

.reviewed-badge {
  position: absolute; top: 14px; right: 14px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 5px; padding: 3px 9px;
  font-size: 12px; color: var(--text2); letter-spacing: 0.4px;
}

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.card-name { font-size: 18px; font-weight: 600; color: var(--text-logo); padding-right: 70px; }
.card-name a { color: inherit; text-decoration: none; }
.card-name a:hover { color: var(--accent); }
.card-sub { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.card-username { font-size: 13px; color: var(--text2); }
.card-project-name {
  font-size: 12px; font-weight: 600; color: var(--stage-text);
  background: var(--stage-bg); border: 1px solid var(--stage-border);
  border-radius: 5px; padding: 2px 8px;
}

.score-badge {
  flex-shrink: 0; border-radius: 8px; padding: 5px 11px;
  font-size: 14px; font-weight: 700;
  background: var(--surface2); border: 1px solid var(--border2); color: var(--text3);
  position: absolute; top: 22px; right: 22px;
}
.score-badge.high { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
.score-badge.med  { background: var(--yellow-bg); border-color: var(--yellow-border); color: var(--yellow-text); }

.card.reviewed .score-badge { top: 44px; }

.card-one-liner { font-size: 14px; color: var(--text3); line-height: 1.6; }

.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  background: var(--tag-bg); border: 1px solid var(--tag-border);
  border-radius: 5px; padding: 4px 10px;
  font-size: 12px; color: var(--tag-text);
}

/* ── Stage badge ── */
.stage-tag { background: var(--stage-bg) !important; border-color: var(--stage-border) !important; color: var(--stage-text) !important; }

/* ── Vote bar ── */
.vote-section {
  display: flex; align-items: center; gap: 10px;
  margin-top: auto; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.vote-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 9px; padding: 9px 16px;
  font-size: 15px; cursor: pointer;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  color: var(--text2);
}
.vote-btn:hover { border-color: var(--accent-border); color: var(--text); }
.vote-btn.up.active   { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
.vote-btn.down.active { background: var(--red-bg);   border-color: var(--red-border);   color: var(--red-text); }
.vote-btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
.vote-btn .count { font-weight: 700; min-width: 16px; text-align: center; }

.voter-avatars { margin-left: auto; display: flex; flex-wrap: wrap; gap: 5px; justify-content: flex-end; max-width: 200px; }
.voter-chip {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; padding: 3px 8px 3px 4px; border-radius: 20px;
  background: var(--surface2); color: var(--text2);
}
.voter-chip.up   { background: var(--green-bg); color: var(--green-text); }
.voter-chip.down { background: var(--red-bg);   color: var(--red-text); }
.voter-chip img {
  width: 20px; height: 20px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
}
.voter-name-btn img {
  width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
}

/* ── Memo drawer ── */
.memo-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; border-top: 1px solid var(--border);
  padding: 12px 0 0; width: 100%;
  font-size: 13px; color: var(--text2); cursor: pointer;
  text-align: left; transition: color 0.12s;
}
.memo-toggle:hover { color: var(--accent); }
.memo-toggle .arrow { font-size: 9px; transition: transform 0.2s; display: inline-block; }
.memo-toggle.open .arrow { transform: rotate(90deg); }
.memo-body {
  display: none; padding: 14px 0 0;
  font-size: 14px; color: var(--memo-text); line-height: 1.75;
  border-top: 1px solid var(--border); margin-top: 12px;
}
.memo-body.open { display: block; }
.memo-body h3 {
  font-size: 12px; font-weight: 700; color: var(--memo-h3);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin: 14px 0 6px;
}
.memo-body h3:first-child { margin-top: 0; }
.memo-body p { margin-bottom: 8px; }
.memo-body ul { padding-left: 16px; margin-bottom: 8px; }
.memo-body li { margin-bottom: 4px; }
.memo-body strong { color: var(--memo-strong); font-weight: 600; }

/* ── Survived tab header ── */
.survived-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px; padding: 12px 16px;
  background: var(--green-bg); border: 1px solid var(--green-border); border-radius: 10px;
  font-size: 12px; color: var(--green-text);
}

/* ── Empty / loading states ── */
.state-msg { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--text4); font-size: 13px; }
.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--spinner-track); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.75s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Logo unicorn image ── */
.logo-unicorn {
  height: 34px; width: auto;
  image-rendering: pixelated;
  display: block; flex-shrink: 0;
}

/* ── Vertical dropdown ── */
.dropdown { position: relative; }
.dropdown-toggle {
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
}
.dropdown-arrow { font-size: 10px; transition: transform 0.15s; }
.dropdown.open .dropdown-arrow { transform: rotate(180deg); }
.dropdown-panel {
  position: absolute; top: calc(100% + 8px); left: 0; z-index: 300;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 10px; padding: 5px;
  min-width: 190px; display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}
.dropdown.open .dropdown-panel { display: block; }
.dropdown-item {
  display: block; width: 100%; text-align: left;
  background: none; border: none; padding: 8px 12px;
  border-radius: 6px; font-size: 13px; color: var(--text2);
  cursor: pointer; transition: background 0.1s, color 0.1s;
}
.dropdown-item:hover { background: var(--surface2); color: var(--text); }
.dropdown-item.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 600; }

/* ── Assign ── */
.assign-wrap { position: relative; }
.assign-btn {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 7px; padding: 7px 11px; font-size: 12px;
  color: var(--text2); cursor: pointer;
  transition: border-color 0.12s, color 0.12s;
  white-space: nowrap;
}
.assign-btn:hover { border-color: var(--accent-border); color: var(--accent-text); }
.assign-btn.has-assignees { border-color: var(--accent-border); color: var(--accent-text); background: var(--accent-bg); }
.assign-panel {
  position: absolute; bottom: calc(100% + 8px); left: 0; z-index: 300;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 10px; padding: 5px; min-width: 170px; display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.13);
}
.assign-panel.open { display: block; }
.assign-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 6px; cursor: pointer;
  font-size: 13px; color: var(--text2); transition: background 0.1s;
  user-select: none;
}
.assign-item:hover { background: var(--surface2); color: var(--text); }
.assign-item.assigned { color: var(--accent-text); font-weight: 600; }
.assign-item .check { font-size: 11px; margin-left: auto; opacity: 0; }
.assign-item.assigned .check { opacity: 1; }
.assign-item img { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }

/* ── Funding info ── */
.funding-info {
  font-size: 12px; color: var(--text2); line-height: 1.7;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 9px 12px;
}
.funding-info .funding-row { display: flex; gap: 5px; }
.funding-info .funding-label { color: var(--text3); white-space: nowrap; }
.funding-info .funding-value { color: var(--text); font-weight: 500; }
.funding-info .funding-investors { color: var(--text2); font-style: italic; }

/* ── Assigned-to chips on card ── */
.assigned-to-row { display: flex; flex-wrap: wrap; gap: 5px; }
.assigned-chip {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; padding: 3px 8px 3px 4px; border-radius: 20px;
  background: var(--accent-bg); color: var(--accent-text); border: 1px solid var(--accent-border);
}
.assigned-chip img { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; }
</style>
</head>
<body>

<header>
  <div class="logo" style="display:flex;align-items:center;gap:10px;">
    <img src="/static/unicorn.png" class="logo-unicorn" alt="IOSG" onerror="this.style.display='none'">
    IOSG <span>Radar</span>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="queue">Queue <span class="badge" id="badge-queue">—</span></button>
    <button class="tab" data-tab="survived">Survived <span class="badge" id="badge-survived">—</span></button>
    <button class="tab" data-tab="all">All <span class="badge" id="badge-all">—</span></button>
    <button class="tab" data-tab="assigned" id="tab-assigned" style="display:none">Assigned <span class="badge" id="badge-assigned">—</span></button>
  </div>
  <div class="voter-wrap">
    <span class="voter-label">Voting as</span>
    <button class="voter-name-btn" id="voterNameBtn">
      <img id="voterAvatarImg" src="" alt="" style="display:none;" onerror="this.style.display='none'">
      <span id="voterNameLabel">…</span>
    </button>
    <a href="/auth/logout" id="logoutLink" style="display:none;font-size:11px;text-decoration:none;margin-left:4px;color:var(--text4);">sign out</a>
    <button class="theme-btn" id="themeToggle" title="Toggle theme">🌙</button>
  </div>
</header>

<!-- Auth overlay -->
<div class="voter-overlay" id="voterOverlay">
  <div class="voter-modal">
    <div class="modal-logo">IOSG <span>Radar</span></div>
    <h2>Sign in to vote</h2>
    <p>Use your <strong>@iosg.vc</strong> Google account.<br>You'll only need to do this once.</p>
    <div id="authError" style="display:none" class="error-msg"></div>
    <a href="/auth/login" style="width:100%;text-decoration:none">
      <button class="google-btn">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
    </a>
  </div>
</div>

<div id="subfilterBar" class="subfilters">
  <button class="sub-btn" data-sub="all">All</button>
  <button class="sub-btn active" data-sub="unvoted">Not voted</button>
  <button class="sub-btn" data-sub="up">Voted up</button>
  <button class="sub-btn" data-sub="down">Voted down</button>
  <span class="filter-divider"></span>
  <button class="sub-btn stage-btn active" data-stage="all">All stages</button>
  <button class="sub-btn stage-btn" data-stage="Early">Early Stage</button>
  <button class="sub-btn stage-btn" data-stage="Growth">Growth Stage</button>
  <span class="filter-divider"></span>
  <div class="dropdown" id="verticalDropdown" style="display:none">
    <button class="sub-btn dropdown-toggle" id="verticalToggle">
      <span class="dropdown-label">All verticals</span> <span class="dropdown-arrow">▾</span>
    </button>
    <div class="dropdown-panel" id="verticalPanel"></div>
  </div>
</div>

<main>
  <div class="summary" id="summary"></div>
  <div class="grid" id="grid">
    <div class="state-msg"><div class="spinner"></div>Loading projects…</div>
  </div>
</main>

<script>
const VOTER_AVATARS = {
  'Darko':  '/static/Darko.jpg',
  'Momir':  '/static/Momir.jpeg',
  'Jocy':   '/static/Jocy.jpg',
  'Mario':  '/static/Mario.png',
  'Yiping': '/static/Yiping.png',
  'Frank':  '/static/Frank.png',
};

function voterAvatarImg(name, size = 20) {
  const src = VOTER_AVATARS[name];
  if (!src) return '';
  return `<img src="${src}" width="${size}" height="${size}" alt="${esc(name)}" onerror="this.style.display='none'" style="border-radius:50%;object-fit:cover;flex-shrink:0;">`;
}

let projects = [];
let assignedProjects = [];
let TEAM_MEMBERS = [];
let PARTNERS = new Set();
let ASSIGNEES = [];
let currentVoter = '';
let currentTab = 'queue';      // queue | survived | all | assigned
let currentSub = 'unvoted';    // all | unvoted | up | down
let currentStage = 'all';      // all | Early | Growth
let currentVertical = 'all';   // all | <sector name>

// ── Bootstrap ──────────────────────────────────────────────────────────────
(async () => {
  // Show auth error if redirected back with ?auth_error=
  const params = new URLSearchParams(location.search);
  if (params.has('auth_error')) {
    const errEl = document.getElementById('authError');
    const msgs = {
      not_in_team: `This email (${params.get('email') || '?'}) isn't in the team list.`,
      cancelled: 'Sign-in was cancelled.',
      token_exchange_failed: 'Google sign-in failed. Please try again.',
      userinfo_failed: 'Could not fetch your Google account info. Please try again.',
    };
    errEl.textContent = msgs[params.get('auth_error')] || 'Sign-in failed. Please try again.';
    errEl.style.display = 'block';
    history.replaceState({}, '', '/'); // clean up URL
  }

  try {
    const [me, cfg, projs] = await Promise.all([
      fetch('/api/me').then(r => r.json()),
      fetch('/api/config').then(r => r.json()),
      fetch('/api/projects').then(r => r.json()),
    ]);

    TEAM_MEMBERS = cfg.team_members || [];
    PARTNERS = new Set(cfg.partners || []);
    ASSIGNEES = cfg.assignees || [];

    if (me.voter) {
      currentVoter = me.voter;
      document.getElementById('voterNameLabel').textContent = me.voter;
      document.getElementById('logoutLink').style.display = 'inline';
      document.getElementById('voterOverlay').classList.add('hidden');
      const avatarEl = document.getElementById('voterAvatarImg');
      const src = VOTER_AVATARS[me.voter];
      if (src) { avatarEl.src = src; avatarEl.style.display = 'block'; }
      document.getElementById('tab-assigned').style.display = '';
      assignedProjects = await fetch('/api/assigned').then(r => r.json());
    }

    projects = projs;
    buildVerticalFilter();
    render();
  } catch (err) {
    document.getElementById('grid').innerHTML =
      `<div class="state-msg">Failed to load: ${esc(String(err))}</div>`;
  }
})();

// ── Tab switching ──────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    document.getElementById('subfilterBar').style.display = currentTab === 'queue' ? 'flex' : 'none';
    render();
  });
});

// ── Sub-filters ────────────────────────────────────────────────────────────
document.querySelectorAll('.sub-btn:not(.stage-btn):not(.vertical-btn)').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sub-btn:not(.stage-btn):not(.vertical-btn)').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSub = btn.dataset.sub;
    render();
  });
});

document.querySelectorAll('.stage-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStage = btn.dataset.stage;
    render();
  });
});

// ── Vertical filter dropdown ────────────────────────────────────────────────
function buildVerticalFilter() {
  const sectors = new Set();
  projects.forEach(p => (p.sectors || []).forEach(s => sectors.add(s)));
  const dropdown = document.getElementById('verticalDropdown');
  const panel    = document.getElementById('verticalPanel');
  const toggle   = document.getElementById('verticalToggle');
  const label    = toggle.querySelector('.dropdown-label');

  if (!sectors.size) return;
  dropdown.style.display = '';

  const sorted = [...sectors].sort();
  panel.innerHTML =
    `<button class="dropdown-item active" data-vertical="all">All verticals</button>` +
    sorted.map(s => `<button class="dropdown-item" data-vertical="${esc(s)}">${esc(s)}</button>`).join('');

  panel.querySelectorAll('.dropdown-item').forEach(item => {
    item.addEventListener('click', () => {
      currentVertical = item.dataset.vertical;
      panel.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      label.textContent = currentVertical === 'all' ? 'All verticals' : currentVertical;
      dropdown.classList.remove('open');
      render();
    });
  });
}

document.getElementById('verticalToggle').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('verticalDropdown').classList.toggle('open');
});
document.addEventListener('click', () => {
  document.getElementById('verticalDropdown').classList.remove('open');
  document.querySelectorAll('.assign-panel.open').forEach(p => p.classList.remove('open'));
});

// ── Data helpers ───────────────────────────────────────────────────────────
function myVote(p) { return (p.voters || {})[currentVoter] || null; }

function queueProjects()    { return projects.filter(p => !p.vote_reviewed); }
function survivedProjects() { return projects.filter(p => (p.vote_up || 0) >= 1); }

function applySubFilter(list) {
  if (currentStage !== 'all')    list = list.filter(p => p.stage_early_growth === currentStage);
  if (currentVertical !== 'all') list = list.filter(p => (p.sectors || []).includes(currentVertical));
  if (currentSub === 'unvoted')  return list.filter(p => !myVote(p));
  if (currentSub === 'up')       return list.filter(p => myVote(p) === 'up');
  if (currentSub === 'down')     return list.filter(p => myVote(p) === 'down');
  return list;
}

function visibleProjects() {
  if (currentTab === 'queue')    return applySubFilter(queueProjects());
  if (currentTab === 'survived') return survivedProjects().sort((a, b) => (b.vote_up || 0) - (a.vote_up || 0) || (b.score || 0) - (a.score || 0));
  if (currentTab === 'assigned') return assignedProjects;
  return projects; // all
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const list = visibleProjects();
  const queue = queueProjects();
  const survived = survivedProjects();

  // Update tab badges
  document.getElementById('badge-queue').textContent    = queue.length;
  document.getElementById('badge-survived').textContent = survived.length;
  document.getElementById('badge-all').textContent      = projects.length;
  document.getElementById('badge-assigned').textContent = assignedProjects.length;

  // Summary line
  const qVoted = queue.filter(p => myVote(p)).length;
  const summaryEl = document.getElementById('summary');
  if (currentTab === 'queue') {
    summaryEl.textContent = `${queue.length} in queue · ${qVoted} voted · ${queue.length - qVoted} remaining`;
  } else if (currentTab === 'survived') {
    summaryEl.textContent = `${survived.length} project${survived.length !== 1 ? 's' : ''} with at least one 👍`;
  } else if (currentTab === 'assigned') {
    summaryEl.textContent = `${assignedProjects.length} project${assignedProjects.length !== 1 ? 's' : ''} assigned to you`;
  } else {
    summaryEl.textContent = `${projects.length} total · ${projects.filter(p => p.vote_reviewed).length} reviewed`;
  }

  const grid = document.getElementById('grid');

  if (!list.length) {
    const msgs = {
      queue: 'No projects in the queue.',
      survived: 'No projects have received a thumbs up yet.',
      assigned: 'No projects have been assigned to you yet.',
      all: 'No projects found.',
    };
    grid.innerHTML = `<div class="state-msg">${msgs[currentTab] || 'No projects found.'}</div>`;
    return;
  }

  grid.innerHTML = list.map(p => cardHTML(p)).join('');

  grid.querySelectorAll('.vote-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const notionId = btn.closest('.card').dataset.id;
      await submitVote(notionId, btn.dataset.vote);
    });
  });

  grid.querySelectorAll('.memo-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('open');
      const body = document.getElementById(`memo-${btn.dataset.id}`);
      if (body) body.classList.toggle('open');
    });
  });

  grid.querySelectorAll('.assign-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const panel = btn.nextElementSibling;
      const isOpen = panel.classList.contains('open');
      document.querySelectorAll('.assign-panel.open').forEach(p => p.classList.remove('open'));
      if (!isOpen) panel.classList.add('open');
    });
  });

  grid.querySelectorAll('.assign-item').forEach(item => {
    item.addEventListener('click', async e => {
      e.stopPropagation();
      const card = item.closest('.card');
      const notionId = card.dataset.id;
      const member = item.dataset.member;
      const proj = [...projects, ...assignedProjects].find(p => p.notion_id === notionId);
      if (!proj) return;
      const current = [...(proj.assigned_to || [])];
      const idx = current.indexOf(member);
      if (idx >= 0) current.splice(idx, 1); else current.push(member);
      proj.assigned_to = current;
      item.classList.toggle('assigned');
      const countEl = card.querySelector('.assign-count');
      if (countEl) countEl.textContent = current.length ? `(${current.length})` : '';
      const assignBtn = card.querySelector('.assign-btn');
      if (assignBtn) assignBtn.classList.toggle('has-assignees', current.length > 0);
      await submitAssign(notionId, current);
    });
  });
}

function fundingHTML(p) {
  const amount = p.last_round_amount;
  const date   = p.last_round_date;
  const investors = p.investors;
  if (!amount && !date && !investors) return '';
  let rows = '';
  if (amount) rows += `<div class="funding-row"><span class="funding-label">Last round:</span><span class="funding-value">${esc(amount)}</span></div>`;
  if (date)   rows += `<div class="funding-row"><span class="funding-label">Date:</span><span class="funding-value">${esc(date)}</span></div>`;
  if (investors) rows += `<div class="funding-row"><span class="funding-label">Investors:</span><span class="funding-investors">${esc(investors)}</span></div>`;
  return `<div class="funding-info">${rows}</div>`;
}

function cardHTML(p) {
  const vote    = myVote(p);
  const score   = p.score || 0;
  const scoreClass = score >= 70 ? 'high' : score >= 50 ? 'med' : '';
  const xUrl = p.x_profile || (p.username ? `https://x.com/${p.username}` : '#');

  const projectName = p.project_name || null;
  const showProject = projectName && projectName.toLowerCase() !== (p.name || '').toLowerCase();

  const sectors  = (p.sectors || []).map(s => `<span class="tag">${esc(s)}</span>`).join('');
  const stageLabel = p.stage_early_growth === 'Early' ? 'Early Stage'
                   : p.stage_early_growth === 'Growth' ? 'Growth Stage' : null;
  const stageBadge = stageLabel ? `<span class="tag stage-tag">${stageLabel}</span>` : '';

  const voterChips = Object.entries(p.voters || {})
    .map(([name, v]) => `<span class="voter-chip ${v}">${voterAvatarImg(name)}${esc(name)}</span>`)
    .join('');

  const reviewedBadge = p.vote_reviewed
    ? `<div class="reviewed-badge">reviewed</div>`
    : '';

  const assignedChips = (p.assigned_to || []).length
    ? `<div class="assigned-to-row">${(p.assigned_to).map(m =>
        `<span class="assigned-chip">${voterAvatarImg(m, 18)}${esc(m)}</span>`).join('')}</div>`
    : '';

  const assignBtn = PARTNERS.has(currentVoter) ? `
    <div class="assign-wrap" style="margin-left:auto">
      <button class="assign-btn${(p.assigned_to||[]).length ? ' has-assignees' : ''}">
        Assign <span class="assign-count">${(p.assigned_to||[]).length ? `(${p.assigned_to.length})` : ''}</span>
      </button>
      <div class="assign-panel">
        ${ASSIGNEES.map(m => `
          <div class="assign-item${(p.assigned_to||[]).includes(m) ? ' assigned' : ''}" data-member="${esc(m)}">
            ${voterAvatarImg(m, 22)}${esc(m)}<span class="check">✓</span>
          </div>`).join('')}
      </div>
    </div>` : '';

  return `
<div class="card${p.vote_reviewed ? ' reviewed' : ''}" data-id="${esc(p.notion_id)}">
  ${reviewedBadge}
  ${score ? `<div class="score-badge ${scoreClass}">${Math.round(score)}</div>` : ''}
  <div class="card-top">
    <div>
      <div class="card-name"><a href="${esc(xUrl)}" target="_blank" rel="noopener">${esc(p.name || p.username)}</a></div>
      <div class="card-sub">
        <span class="card-username">@${esc(p.username)}</span>
        ${showProject ? `<span class="card-project-name">${esc(projectName)}</span>` : ''}
      </div>
    </div>
  </div>
  ${p.one_liner ? `<div class="card-one-liner">${esc(p.one_liner)}</div>` : ''}
  ${(stageBadge || sectors) ? `<div class="tags">${stageBadge}${sectors}</div>` : ''}
  ${fundingHTML(p)}
  ${assignedChips}
  ${p.memo ? `
  <button class="memo-toggle" data-id="${esc(p.notion_id)}">
    <span class="arrow">▶</span> View memo
  </button>
  <div class="memo-body" id="memo-${esc(p.notion_id)}">${renderMemo(p.memo)}</div>` : ''}
  <div class="vote-section">
    <button class="vote-btn up ${vote === 'up' ? 'active' : ''}" data-vote="up" ${!currentVoter ? 'disabled' : ''}>
      👍 <span class="count">${p.vote_up || 0}</span>
    </button>
    <button class="vote-btn down ${vote === 'down' ? 'active' : ''}" data-vote="down" ${!currentVoter ? 'disabled' : ''}>
      👎 <span class="count">${p.vote_down || 0}</span>
    </button>
    ${voterChips ? `<div class="voter-avatars">${voterChips}</div>` : ''}
    ${assignBtn}
  </div>
</div>`;
}

// ── Vote submission ────────────────────────────────────────────────────────
async function submitVote(notionId, vote) {
  if (!currentVoter) return;
  const project = projects.find(p => p.notion_id === notionId);
  if (!project) return;

  const prevVote = (project.voters || {})[currentVoter];
  if (prevVote === vote) return; // already voted this way

  // Optimistic update
  if (prevVote) project[`vote_${prevVote}`] = Math.max(0, (project[`vote_${prevVote}`] || 0) - 1);
  project.voters = { ...(project.voters || {}), [currentVoter]: vote };
  project[`vote_${vote}`] = (project[`vote_${vote}`] || 0) + 1;
  render();

  try {
    const res = await fetch('/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ notion_id: notionId, vote }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    // Sync with server truth
    const proj = projects.find(p => p.notion_id === notionId);
    if (proj) {
      proj.vote_up      = data.vote_up;
      proj.vote_down    = data.vote_down;
      proj.voters       = data.voters;
      if (data.reviewed) proj.vote_reviewed = true;
    }
    render();
  } catch (err) {
    // Roll back optimistic update
    if (prevVote) {
      project.voters[currentVoter]  = prevVote;
      project[`vote_${vote}`]       = Math.max(0, (project[`vote_${vote}`] || 0) - 1);
      project[`vote_${prevVote}`]   = (project[`vote_${prevVote}`] || 0) + 1;
    } else {
      delete project.voters[currentVoter];
      project[`vote_${vote}`] = Math.max(0, (project[`vote_${vote}`] || 0) - 1);
    }
    render();
    console.error('Vote failed:', err);
  }
}

// ── Assign submission ──────────────────────────────────────────────────────
async function submitAssign(notionId, assignees) {
  try {
    const res = await fetch('/api/assign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ notion_id: notionId, assignees }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    const proj = [...projects, ...assignedProjects].find(p => p.notion_id === notionId);
    if (proj) proj.assigned_to = data.assigned_to;
  } catch (err) {
    console.error('Assign failed:', err);
  }
}

function renderMemo(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '';
  let inList = false;
  for (const line of lines) {
    const t = line.trim();
    if (!t) {
      if (inList) { html += '</ul>'; inList = false; }
      continue;
    }
    const applyBold = s => esc(s).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    if (/^#{1,3} /.test(t)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h3>${esc(t.replace(/^#{1,3} /, ''))}</h3>`;
    } else if (/^[-•] /.test(t)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${applyBold(t.slice(2))}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p>${applyBold(t)}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

// ── Theme ──────────────────────────────────────────────────────────────────
(function () {
  const saved = localStorage.getItem('theme') || 'light';
  applyTheme(saved);
  document.getElementById('themeToggle').addEventListener('click', () => {
    const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('theme', next);
  });
  function applyTheme(t) {
    document.documentElement.dataset.theme = t;
    document.getElementById('themeToggle').textContent = t === 'dark' ? '☀' : '🌙';
  }
})();

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
